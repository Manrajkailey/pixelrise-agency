<svg viewBox="0 0 600 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6c63ff"/>
      <stop offset="100%" stop-color="#00d4aa"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6c63ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00d4aa" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background blob -->
  <ellipse cx="300" cy="260" rx="270" ry="230" fill="url(#g2)"/>

  <!-- Monitor / dashboard -->
  <rect x="120" y="120" width="360" height="230" rx="14" fill="#1a1a2e"/>
  <rect x="136" y="138" width="328" height="178" rx="6" fill="#252540"/>

  <!-- Growth chart bars -->
  <rect x="160" y="260" width="28" height="50" rx="3" fill="#6c63ff"/>
  <rect x="198" y="230" width="28" height="80" rx="3" fill="#7d75ff"/>
  <rect x="236" y="200" width="28" height="110" rx="3" fill="#00d4aa"/>
  <rect x="274" y="170" width="28" height="140" rx="3" fill="#27dfb6"/>
  <rect x="312" y="150" width="28" height="160" rx="3" fill="#4ee8c8"/>

  <!-- Trend line -->
  <polyline points="170,255 210,225 248,195 286,165 324,145 360,150" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <circle cx="360" cy="150" r="6" fill="#ffffff"/>

  <!-- Monitor stand -->
  <rect x="280" y="350" width="40" height="30" fill="#1a1a2e"/>
  <rect x="240" y="380" width="120" height="14" rx="7" fill="#1a1a2e"/>

  <!-- Floating cards -->
  <g transform="translate(60,80)">
    <rect width="120" height="64" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
    <circle cx="24" cy="32" r="14" fill="url(#g1)"/>
    <text x="46" y="27" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#1a1a2e">SEO Rank</text>
    <text x="46" y="42" font-family="Arial, sans-serif" font-size="14" font-weight="800" fill="#00d4aa">+217%</text>
  </g>

  <g transform="translate(410,330)">
    <rect width="130" height="64" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
    <circle cx="24" cy="32" r="14" fill="#00d4aa"/>
    <text x="46" y="27" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#1a1a2e">ROAS</text>
    <text x="46" y="42" font-family="Arial, sans-serif" font-size="14" font-weight="800" fill="#6c63ff">8.3x</text>
  </g>

  <!-- People icons -->
  <g transform="translate(95,360)">
    <circle cx="20" cy="14" r="14" fill="#6c63ff"/>
    <path d="M0,52 Q0,28 20,28 Q40,28 40,52 Z" fill="#6c63ff"/>
  </g>
  <g transform="translate(140,370)">
    <circle cx="18" cy="13" r="13" fill="#00d4aa"/>
    <path d="M0,48 Q0,26 18,26 Q36,26 36,48 Z" fill="#00d4aa"/>
  </g>
  <g transform="translate(440,90)">
    <circle cx="16" cy="12" r="12" fill="#7d75ff" opacity="0.8"/>
    <path d="M0,44 Q0,24 16,24 Q32,24 32,44 Z" fill="#7d75ff" opacity="0.8"/>
  </g>

  <!-- Decorative dots -->
  <circle cx="510" cy="200" r="5" fill="#00d4aa" opacity="0.6"/>
  <circle cx="530" cy="220" r="3" fill="#6c63ff" opacity="0.6"/>
  <circle cx="70" cy="200" r="4" fill="#6c63ff" opacity="0.5"/>
  <circle cx="50" cy="250" r="3" fill="#00d4aa" opacity="0.5"/>
</svg>
